<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TokoKu</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f5f5f5;
padding-bottom:80px;
}

header{
background:#0ea5e9;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
position:sticky;
top:0;
z-index:10;
}

.produk-container{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:12px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 2px 6px rgba(0,0,0,.1);
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.card-body{
padding:10px;
}

.nama{
font-size:15px;
font-weight:bold;
margin-bottom:6px;
}

.harga{
color:#16a34a;
font-weight:bold;
margin-bottom:8px;
}

.btn{
width:100%;
padding:10px;
border:none;
background:#0ea5e9;
color:white;
border-radius:8px;
font-weight:bold;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:10px;
box-shadow:0 -2px 10px rgba(0,0,0,.1);
z-index:100;
}

.bottom-nav button{
border:none;
background:none;
font-size:28px;
}

.cart-popup{
position:fixed;
top:0;
right:-100%;
width:85%;
height:100%;
background:white;
z-index:999;
transition:.3s;
overflow:auto;
padding:15px;
}

.cart-popup.active{
right:0;
}

.cart-item{
display:flex;
justify-content:space-between;
margin:10px 0;
border-bottom:1px solid #ddd;
padding-bottom:8px;
}

.total{
font-size:18px;
font-weight:bold;
margin-top:20px;
}

.checkout-btn{
width:100%;
padding:14px;
background:#22c55e;
border:none;
color:white;
border-radius:10px;
margin-top:20px;
font-size:16px;
font-weight:bold;
}

</style>
</head>
<body>

<header>
TOKO ONLINE
</header>

<div class="produk-container" id="produkContainer"></div>

<!-- CART -->
<div class="cart-popup" id="cartPopup">

<h2>Keranjang</h2>

<div id="cartList"></div>

<div class="total" id="totalHarga">
Total : Rp0
</div>

<button class="checkout-btn"
onclick="window.location.href='checkout.html'">
Checkout WhatsApp
</button>

</div>

<!-- MENU BAWAH -->
<div class="bottom-nav">

<button onclick="toggleCart()">
🛒
</button>

<button onclick="window.location.href='checkout.html'">
📱
</button>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
onValue
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

  apiKey: "AIzaSyCvco9APepbM1YRhDLGzE2uxFBVtLL2NLs",
  authDomain: "fauz2327-b8dfa.firebaseapp.com",
  databaseURL: "https://fauz2327-b8dfa-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "fauz2327-b8dfa",
  storageBucket: "fauz2327-b8dfa.firebasestorage.app",
  messagingSenderId: "625104866445",
  appId: "1:625104866445:web:129165fbc539edb36466c4",

};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const produkContainer =
document.getElementById("produkContainer");

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

function simpanCart(){

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

renderCart();

}

function tambahCart(id,nama,harga,gambar){

const cek = cart.find(x=>x.id==id);

if(cek){

cek.qty += 1;

}else{

cart.push({
id,
nama,
harga,
gambar,
qty:1
});

}

simpanCart();

alert("Ditambahkan");

}

window.toggleCart = function(){

document
.getElementById("cartPopup")
.classList.toggle("active");

renderCart();

}

function renderCart(){

const cartList =
document.getElementById("cartList");

const totalHarga =
document.getElementById("totalHarga");

cartList.innerHTML="";

let total = 0;

cart.forEach((item,index)=>{

total += item.harga * item.qty;

cartList.innerHTML += `

<div class="cart-item">

<div>
<b>${item.nama}</b><br>
${item.qty} x Rp${item.harga}
</div>

<div>
<button onclick="hapusItem(${index})">
❌
</button>
</div>

</div>

`;

});

totalHarga.innerHTML =
`Total : Rp${total.toLocaleString()}`;

}

window.hapusItem = function(index){

cart.splice(index,1);

simpanCart();

}

onValue(ref(db,"produk"),(snap)=>{

produkContainer.innerHTML="";

snap.forEach((child)=>{

const p = child.val();

produkContainer.innerHTML += `

<div class="card">

<img src="${p.gambar}">

<div class="card-body">

<div class="nama">
${p.nama}
</div>

<div class="harga">
Rp${Number(p.harga).toLocaleString()}
</div>

<button class="btn"
onclick="tambahCart(
'${child.key}',
'${p.nama}',
${p.harga},
'${p.gambar}'
)">
Tambah
</button>

</div>

</div>

`;

});

});

window.tambahCart = tambahCart;

</script>

</body>
</html>
