<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>TOKO DEFANA</title>

<link
rel="stylesheet"
href="style.css">

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link
rel="manifest"
href="manifest.json">

<meta
name="theme-color"
content="#16a34a">

</head>

<body>

<!-- =========================
TOPBAR
========================= -->

<div class="topbar">

<h1>TOKO DEFANA</h1>

<button
class="help-btn"
onclick="openBantuan()">

❓

</button>

</div>

<!-- =========================
SEARCH
========================= -->

<div class="search-container">

<div class="search-box">

<span class="search-icon">

🔍

</span>

<input
type="text"
id="searchInput"
placeholder="Cari produk..."
oninput="renderProduk()">

<button
class="clear-search"
onclick="clearSearch()">

✕

</button>

</div>

</div>

<!-- =========================
KATEGORI GESER
========================= -->

<div
id="kategoriList"
class="kategori-scroll">

</div>

<!-- =========================
LIST PRODUK
========================= -->

<div id="productList">

</div>

<!-- =========================
KERANJANG
========================= -->

<div
class="cart-box"
id="cartBox">

<div class="cart-header">

<h2>Keranjang</h2>

<button
class="close-btn"
onclick="toggleCart()">

✕

</button>

</div>

<!-- FORM -->

<div class="cart-form">

<input
type="text"
id="namaPemesan"
placeholder="👤 Nama Pemesan">

<select
id="pengiriman"
onchange="toggleMetode()">

<option value="Diantar">

🚚 Diantar

</option>

<option value="Ambil Sendiri">

🏪 Ambil Sendiri

</option>

</select>

<select
id="pembayaran"
onchange="toggleQR()">

<option value="COD">

💵 COD

</option>

<option value="Transfer">

🏦 Transfer

</option>

</select>

</div>

<!-- QR -->

<div
id="qrBox"
style="display:none;">

<p class="qr-title">

Scan QR Pembayaran

</p>

<img
src="img/barcode.png"
class="qr-img">

</div>

<!-- CART ITEM -->

<div id="cartItems"></div>

<div id="cartTotal"></div>

<!-- BUTTON -->

<button
id="btnWA"
class="checkout-btn"
onclick="checkoutWA()">

📲 Checkout WhatsApp

</button>

<button
class="reset-btn"
onclick="resetCart()">

🗑 Reset Keranjang

</button>

</div>

<!-- =========================
POPUP PRODUK
========================= -->

<div
class="popup"
id="popupBox">

<div class="popup-content">

<button
class="popup-x"
onclick="closePopup()">

✕

</button>

<h2 id="popupNama">

Produk

</h2>

<p id="popupHarga">

Rp 0

</p>

<div class="popup-qty">

<button onclick="popupKurang()">

−

</button>

<input
type="number"
id="popupQty"
value="1"
min="1">

<button onclick="popupTambah()">

+

</button>

</div>

<p class="stok-popup">

Stok tersedia :
<span id="popupStok">

0

</span>

</p>

<button
class="popup-btn"
onclick="confirmAddCart()">

🛒 Tambah ke Keranjang

</button>

<button
class="popup-close"
onclick="closePopup()">

Tutup

</button>

</div>

</div>

<!-- =========================
BOTTOM MENU
========================= -->

<div class="bottom-menu">

<button onclick="
window.scrollTo({
top:0,
behavior:'smooth'
})
">

<span>🏠</span>

Home

</button>

<button onclick="bukaLokasiPopup()">

<span>📍</span>

Lokasi

</button>

<button
onclick="toggleCart()"
class="menu-cart">

<span>🛒</span>

Keranjang

<div id="bottomCartCount">

0

</div>

</button>

</div>

<!-- =========================
POPUP LOKASI
========================= -->

<div
id="popupLokasi"
class="popup">

<div class="popup-content">

<h2>

📍 Buka Google Maps?

</h2>

<p>

Lokasi toko akan dibuka di Google Maps

</p>

<button
class="popup-btn"
onclick="bukaMaps()">

Buka

</button>

<button
class="popup-close"
onclick="tutupPopupLokasi()">

Batal

</button>

</div>

</div>

<!-- =========================
POPUP BANTUAN
========================= -->

<div
class="popup"
id="popupBantuan">

<div class="popup-content bantuan-content">

<h2>

❓ Bantuan Checkout

</h2>

<h3>

🛒 Cara Checkout

</h3>

<ol>

<li>
Tambahkan produk
</li>

<li>
Isi nama
</li>

<li>
Pilih pembayaran
</li>

<li>
Klik checkout
</li>

<li>
Kirim WhatsApp
</li>

</ol>

<button
class="popup-btn"
onclick="closeBantuan()">

Mengerti

</button>

</div>

</div>

<!-- =========================
TOAST
========================= -->

<div id="toast">

<span id="toastText"></span>

</div>

<!-- =========================
FIREBASE
========================= -->

<script src="
https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js
"></script>

<script src="
https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js
"></script>

<!-- =========================
SCRIPT UTAMA
========================= -->

<script
type="module"
src="script.js">

</script>

<!-- =========================
SERVICE WORKER
========================= -->

<script>

if(
'serviceWorker'
in navigator
){

navigator.serviceWorker
.register('./sw.js');

}

</script>

<!-- =========================
FUNCTION
========================= -->

<script>

function toggleCart(){

document
.getElementById('cartBox')
.classList
.toggle('active');

}

function bukaLokasiPopup(){

document
.getElementById('popupLokasi')
.classList
.add('active');

}

function tutupPopupLokasi(){

document
.getElementById('popupLokasi')
.classList
.remove('active');

}

function bukaMaps(){

window.open(
'https://maps.app.goo.gl/Sqf951NhZioxFuC2A'
);

}

function openBantuan(){

document
.getElementById('popupBantuan')
.classList
.add('active');

}

function closeBantuan(){

document
.getElementById('popupBantuan')
.classList
.remove('active');

}

</script>

</body>
</html>
