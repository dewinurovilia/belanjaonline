<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout WA</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:15px;
}

.box{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

.item{
display:flex;
justify-content:space-between;
margin-bottom:10px;
padding-bottom:10px;
border-bottom:1px solid #ddd;
}

input,textarea{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ccc;
border-radius:10px;
}

button{
width:100%;
padding:14px;
border:none;
background:#22c55e;
color:white;
font-size:16px;
border-radius:12px;
font-weight:bold;
margin-top:15px;
}

.total{
font-size:18px;
font-weight:bold;
margin-top:10px;
}

</style>
</head>
<body>

<div class="box">

<h2>Checkout WhatsApp</h2>

<input type="text"
id="nama"
placeholder="Nama">

<input type="tel"
id="nomor"
placeholder="Nomor WhatsApp">

<textarea
id="catatan"
placeholder="Catatan"></textarea>

</div>

<div class="box">

<div id="listProduk"></div>

<div class="total"
id="totalHarga">
Total : Rp0
</div>

<button onclick="kirimPesanan()">
Kirim Pesanan
</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
push
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey:"ISI_APIKEY",
authDomain:"ISI",
databaseURL:"ISI",
projectId:"ISI",
storageBucket:"ISI",
messagingSenderId:"ISI",
appId:"ISI"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

const cart =
JSON.parse(localStorage.getItem("cart")) || [];

const listProduk =
document.getElementById("listProduk");

const totalHarga =
document.getElementById("totalHarga");

let total = 0;

cart.forEach(item=>{

total += item.harga * item.qty;

listProduk.innerHTML += `

<div class="item">

<div>
<b>${item.nama}</b><br>
${item.qty} x Rp${item.harga}
</div>

<div>
Rp${(item.qty * item.harga).toLocaleString()}
</div>

</div>

`;

});

totalHarga.innerHTML =
`Total : Rp${total.toLocaleString()}`;

window.kirimPesanan = async function(){

const nama =
document.getElementById("nama").value;

const nomor =
document.getElementById("nomor").value;

const catatan =
document.getElementById("catatan").value;

if(!nama || !nomor){

alert("Lengkapi data");

return;

}

let pesan =
`*PESANAN BARU*%0A%0A`;

pesan +=
`Nama : ${nama}%0A`;

pesan +=
`Nomor : ${nomor}%0A`;

pesan +=
`Catatan : ${catatan}%0A%0A`;

cart.forEach(item=>{

pesan +=
`${item.nama} x ${item.qty}%0A`;

});

pesan += `%0ATotal : Rp${total}`;

<!-- SIMPAN FIREBASE -->
await push(ref(db,"pesanan"),{

nama,
nomor,
catatan,
cart,
total,
waktu:Date.now()

});

<!-- GOOGLE SHEET -->
fetch("URL_APPS_SCRIPT",{

method:"POST",

body:JSON.stringify({

nama,
nomor,
catatan,
cart,
total

})

});

window.open(

`https://wa.me/628xxxxxxxxxx?text=${pesan}`,
"_blank"

);

localStorage.removeItem("cart");

}

</script>

</body>
</html>
